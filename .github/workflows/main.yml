name: Build Fabric Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать проект
        uses: actions/checkout@v4

      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Дать права gradlew
        run: chmod +x ./gradlew

      - name: Собрать мод
        run: ./gradlew build

      - name: Загрузить готовый JAR
        uses: actions/upload-artifact@v4
        with:
          name: chat-ai-moderator-fabric-1.21.11
          path: build/libs/*.jar
